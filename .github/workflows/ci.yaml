name: ci

on:
  push:
    branches:
      - main
      - release-2

  pull_request:
    branches:
      - main
      - release-2

  workflow_dispatch:

jobs:
  cabal:
    strategy:
      fail-fast: false
      matrix:
        ghc:
          - "9.4.8"
          - "9.6.3"
          - "9.8.1"
        os:
        - "macos-latest"
        - "ubuntu-latest"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Configure
        run: cabal configure --enable-tests --ghc-options -Werror

      - name: Compile
        run: cabal build lib:shrun

      - name: Unit Tests
        run: cabal test unit --test-options '--hedgehog-tests 100000'

      - name: Integration Tests
        run: cabal test integration

      - name: Functional Tests
        run: cabal test functional

      - name: Benchmarks
        if: ${{ matrix.os == 'ubuntu-latest' }}
        id: bench
        run: |
          cabal bench --benchmark-options '
            --csv benchmarks/${{ matrix.os }}_${{ matrix.ghc }}_ci.csv
            --svg benchmarks/${{ matrix.os }}_${{ matrix.ghc }}_ci.svg
            --baseline benchmarks/baseline_${{ matrix.os }}_${{ matrix.ghc }}_ci.csv
            --fail-if-slower 50
            --fail-if-faster 50'

      - uses: actions/upload-artifact@v3
        if: ${{ failure() && steps.bench.conclusion == 'failure' }}
        with:
          name: build-artifacts
          path: |
            benchmarks/${{ matrix.os }}_${{ matrix.ghc }}_ci.csv
            benchmarks/${{ matrix.os }}_${{ matrix.ghc }}_ci.svg
  nix:
    strategy:
      fail-fast: false
      matrix:
        os:
        - "macos-latest"
        - "ubuntu-latest"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Compile & Test
        run: |
          set +e

          out=$(nix build 2>&1)
          ec=$?

          regex=".*'(nix log \/nix\/store\/.*.drv)'.*"

          if [[ $ec -ne 0 ]]; then
            if [[ $out =~ $regex ]]; then
              echo echo "*** Regex match ***"
              log_cmd="${BASH_REMATCH[1]}"
              $log_cmd | cat
            else
              echo "*** No regex match on output ***"
              echo $out
            fi
          fi

          exit $ec
  lint:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4

      - name: Setup nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Formatting
        run: |
          nix run .#format
          git diff --exit-code --color=always

      - name: HLint
        run: nix run .#lint
  release:
    needs: [cabal, nix, lint]
    strategy:
      fail-fast: false
      matrix:
        ghc:
          - "9.6.3"
        os:
        - "macos-latest"
        - "ubuntu-latest"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Configure
        run: cabal configure --enable-tests --ghc-options -Werror

      - name: Compile
        run: cabal build exe:shrun

      - name: Install binary
        if: github.ref == 'refs/heads/release'
        run: |
          cabal install --installdir=. --install-method=copy --program-suffix=-${{ matrix.os }}
          ls

      - name: Upload binary
        uses: actions/upload-artifact@v3
        if: github.ref == 'refs/heads/release'
        with:
          name: build-artifacts
          path: shrun-${{ matrix.os }}
